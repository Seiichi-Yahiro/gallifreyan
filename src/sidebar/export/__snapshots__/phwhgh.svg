<svg xmlns="http://www.w3.org/2000/svg" id="gallifreyan" style="width: 100%; height: 100%;" viewBox="-500 -500 1000 1000">
    <style>
        .sentence__outer {
            stroke-width: 3px;
        }

        .sentence__inner,
        .word,
        .letter,
