<svg xmlns="http://www.w3.org/2000/svg" id="gallifreyan" style="width: 100%; height: 100%;" viewBox="-500 -500 1000 1000">
    <style>
        .sentence__outer {
            stroke-width: 3px;
        }

        .sentence__inner,
        .word,
        .letter,
        .dot {
            stroke-width: 1px;
        }

        .sentence__outer,
        .sentence__inner,
        .word,
        .letter,
        .dot {
            stroke: currentColor;
        }

        .word,
        .letter {
            stroke-linecap: round;
        }

        .sentence__outer,
        .sentence__inner,
        .word,
        .letter {
            fill: transparent;
        }

        .dot {
            fill: currentColor;
        }
    </style>
    <g style="transform: translate(0px, 0px);">
        <circle cx="0" cy="0" r="460" class="sentence__outer"/>
        <circle cx="0" cy="0" r="450" class="sentence__inner"/>
        <g style="transform: translate(0px, 0px);">
            <circle cx="0" cy="0" r="225" class="word"/>
            <g style="transform: rotate(-0rad) translateY(253.92857142857142px);">
                <circle cx="0" cy="0" r="19.285714285714285" class="letter"/>
            </g>
            <g style="transform: rotate(-1.2566370614359172rad) translateY(225px);">
                <circle cx="0" cy="0" r="19.285714285714285" class="letter"/>
            </g>
            <g style="transform: rotate(-2.5132741228718345rad) translateY(225px);">
                <circle cx="0" cy="0" r="19.285714285714285" class="letter"/>
            </g>
            <g style="transform: rotate(-3.7699111843077517rad) translateY(196.07142857142858px);">
                <circle cx="0" cy="0" r="19.285714285714285" class="letter"/>
            </g>
            <g style="transform: rotate(-5.026548245743669rad) translateY(225px);">
                <circle cx="0" cy="0" r="19.285714285714285" class="letter"/>
            </g>
        </g>
    </g>
</svg>